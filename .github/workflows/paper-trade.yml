name: paper-trade

on:
  # Normal start: paper-trade-starter.yml dispatches this at 09:35 IST
  # (its own cron fires at 08:30 IST and it idles until 09:35, absorbing
  # GitHub's cron delays; dispatched runs start within seconds).
  workflow_dispatch:
  schedule:
    # Disaster fallback only, in case the starter never ran. If the starter
    # did run, this queues behind the live run (same concurrency group) and
    # exits within a minute once it starts after 15:30 IST.
    - cron: '10 4 * * 1-5'

permissions:
  contents: write

concurrency:
  group: paper-trade
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 358        # from a 09:35 IST dispatch this outlives the
                                # script's own 15:30 exit, within GitHub's 6h cap
    env:
      TZ: Asia/Kolkata
      UPSTOX_TOKEN: ${{ secrets.UPSTOX_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run paper trader (sync results every 15 min)
        working-directory: src
        run: |
          git config user.name "paper-trade-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python paper_trade.py &
          PID=$!
          while kill -0 $PID 2>/dev/null; do
            sleep 900
            kill -0 $PID 2>/dev/null || break
            git add ../results/paper_* 2>/dev/null || true
            git commit -m "sync: intraday $(date +%H:%M)" || true
            git pull --rebase origin main || true
            git push || true
          done
          wait $PID || true

      - name: Final sync
        if: always()
        run: |
          git add results/paper_* 2>/dev/null || true
          git commit -m "sync: end of day $(date +%F)" || true
          git pull --rebase origin main || true
          git push || true
